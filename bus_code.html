<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>乘车码</title>
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" type="text/css" href="../css/mui.min.css" />
	<link rel="stylesheet" type="text/css" href="../css/icons-extra.css" />
</head>

<body>
	<header class="mui-bar mui-bar-nav">
		<h1 class="mui-title">乘车码</h1>
	</header>

	<div class="mui-content" style="background:#efeff4;">
	<div style="padding:10px;">
		<!-- 电子卡 -->
		<div style="background:#007AFF; border-radius:10px; padding:16px; color:#fff; margin-bottom:12px;">
			<div style="display:flex; justify-content:space-between; margin-bottom:12px;">
				<span style="font-size:15px; font-weight:600;">智慧公交电子卡</span>
				<span style="font-size:11px; opacity:0.7;">NO. 8621 0034</span>
			</div>
			<div style="text-align:center; margin-bottom:12px;">
				<p style="font-size:12px; opacity:0.7;color: #fff;">余额</p>
				<p style="font-size:30px; font-weight:bold;color: #fff;">¥ 56.50</p>
			</div>
			<div style="text-align:center;">
				<button type="button" class="mui-btn" id="btn-recharge"
					style="background:#fff; color:#007AFF; border-radius:16px; padding:6px 20px; font-size:13px; font-weight:600;">
					立即充值
				</button>
			</div>
		</div>

		<!-- 二维码卡片 -->
		<div style="background:#fff; border-radius:10px; box-shadow:0 1px 2px rgba(0,0,0,0.3); padding:20px; text-align:center;">
			<div style="display:inline-flex; width:160px; height:160px; background:#f4f4f5; border-radius:8px; align-items:center; justify-content:center; margin-bottom:12px;">
				<img src="../images/qrcode.png" style="width:110px; height:110px;">
			</div>
			<p style="color:#8f8f94; font-size:13px;">将二维码对准扫码区即可乘车</p>
		</div>
	</div>
	</div>

	<script src="../js/mui.min.js" type="text/javascript" charset="utf-8"></script>
	<script src="../libs/echarts-all.js" type="text/javascript" charset="utf-8"></script>
	<script src="../js/better.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		mui.init()

		document.getElementById('btn-recharge').addEventListener('tap', function() {
			mui.toast('充值功能开发中')
		})
	</script>
</body>

</html>
