<!doctype html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <title>线路详情</title>
        <meta name="viewport"
            content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
        <link rel="stylesheet" type="text/css" href="../css/mui.min.css" />
        <link rel="stylesheet" type="text/css" href="../css/icons-extra.css" />
        <style>
            .card {
                background: #fff;
                border-radius: 10px;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
                margin-bottom: 10px;
                overflow: hidden;
            }

            .station {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 0 15px;
                height: 40px;
                border-bottom: 1px solid #c8c7cc;
            }

            .station:last-child {
                border-bottom: 0;
            }

            .dot {
                display: inline-block;
                border-radius: 50%;
                flex-shrink: 0;
            }
        </style>
    </head>

    <body>
        <header class="mui-bar mui-bar-nav">
            <a class="mui-icon mui-icon-left-nav mui-pull-left" id="btn-back"></a>
            <h1 class="mui-title">101路</h1>
            <span class="mui-icon mui-icon-star mui-pull-right" style="color:#333;" onclick="a()" id="starBtn"></span>
        </header>

        <div class="mui-content" style="background:#efeff4;">
            <div style="padding:10px;">
                <!-- 线路信息卡 -->
                <div class="card" style="padding:15px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <p style="font-size:15px; font-weight:600;">开往 火车站方向</p>
                            <p style="font-size:12px; color:#8f8f94; margin-top:4px;">首班 06:00 · 末班 22:30</p>
                        </div>
                        <div style="text-align:center;">
                            <p style="font-size:20px; font-weight:bold; color:#007AFF;">3分钟</p>
                            <p style="font-size:11px; color:#8f8f94; margin-top:2px;">即将到站</p>
                        </div>
                    </div>
                </div>
                <!-- 站点列表 -->
                <div class="card">
                    <div class="station">
                        <span class="dot" style="width:8px; height:8px; background:#C8C7CC;"></span>
                        <span style="flex:1; color:#8F8F94; font-size:15px;">公交总站</span>
                        <span style="color:#8F8F94; font-size:12px;">已过站</span>
                    </div>
                    <div class="station">
                        <span class="dot" style="width:8px; height:8px; background:#C8C7CC;"></span>
                        <span style="flex:1; color:#8F8F94; font-size:15px;">市政府站</span>
                        <span style="color:#8F8F94; font-size:12px;">已过站</span>
                    </div>
                    <div class="station" style="background:#E8F4FD;">
                        <span class="dot" style="width:10px; height:10px; background:#007AFF;"></span>
                        <span style="flex:1; color:#007AFF; font-size:15px; font-weight:600;">人民广场站</span>
                        <span style="color:#007AFF; font-size:12px; font-weight:600;">3分钟</span>
                    </div>
                    <div class="station">
                        <span class="dot" style="width:8px; height:8px; background:#E4E4E7;"></span>
                        <span style="flex:1; color:#000; font-size:15px;">中山路站</span>
                        <span style="color:#8F8F94; font-size:12px;">8分钟</span>
                    </div>
                    <div class="station">
                        <span class="dot" style="width:8px; height:8px; background:#E4E4E7;"></span>
                        <span style="flex:1; color:#000; font-size:15px;">火车站</span>
                        <span style="color:#8F8F94; font-size:12px;">15分钟</span>
                    </div>
                </div>
            </div>
        </div>

        <script src="../js/mui.min.js" type="text/javascript" charset="utf-8"></script>
        <script src="../libs/echarts-all.js" type="text/javascript" charset="utf-8"></script>
        <script src="../js/better.js" type="text/javascript" charset="utf-8"></script>
        <script type="text/javascript">
            mui.init()

            document.getElementById('btn-back').addEventListener('tap', function() {
                if (window.plus) {
                    plus.webview.currentWebview().close('slide-out-right')
                } else {
                    window.history.back()
                }
            })

            let shu = 0;

            function a() {
                shu++
                const star = document.getElementById('starBtn');
                console.log(shu);
                if (shu % 2) {
                    star.style.color = "#FF3B30";
                    mui.toast('收藏成功')
                } else {
                    star.style.color = "#333"
                    mui.toast('取消收藏')
                }
            }
        </script>
    </body>

</html>
