<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>信息服务</title>
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" type="text/css" href="../css/mui.min.css" />
	<link rel="stylesheet" type="text/css" href="../css/icons-extra.css" />
	<style>
		.card { background:#fff; border-radius:10px; box-shadow:0 1px 2px rgba(0,0,0,0.3); overflow:hidden; }
		.sub { font-size:12px; color:#8f8f94; margin-top:4px; }
	</style>
</head>

<body>
	<header class="mui-bar mui-bar-nav">
		<a class="mui-icon mui-icon-left-nav mui-pull-left" id="btn-back"></a>
		<h1 class="mui-title">信息服务</h1>
	</header>

	<div class="mui-content" style="background:#efeff4;">
	<div style="padding:10px;">
		<!-- 分段控件 -->
		<div class="mui-segmented-control" style="margin-bottom:10px;">
			<a class="mui-control-item mui-active" href="#seg-news">新闻资讯</a>
			<a class="mui-control-item" href="#seg-ban">禁携带物</a>
			<a class="mui-control-item" href="#seg-lost">失物招领</a>
		</div>

		<!-- 新闻资讯 -->
		<div id="seg-news" class="mui-control-content mui-active">
			<div class="card">
				<ul class="mui-table-view" style="border:0;">
					<li class="mui-table-view-cell">
						关于调整305路公交线路的通知
						<p class="sub">2023-05-02 · 市公交集团</p>
					</li>
					<li class="mui-table-view-cell">
						清明假期公交运营时间延长通知
						<p class="sub">2023-05-02 · 市公交集团</p>
					</li>
					<li class="mui-table-view-cell">
						新增夜间班车N1路开通运营
						<p class="sub">2023-05-02 · 市公交集团</p>
					</li>
				</ul>
			</div>
		</div>

		<!-- 禁携带物 -->
		<div id="seg-ban" class="mui-control-content">
			<div class="card">
				<ul class="mui-table-view" style="border:0;">
					<li class="mui-table-view-cell">易燃易爆物品</li>
					<li class="mui-table-view-cell">管制刀具</li>
					<li class="mui-table-view-cell">腐蚀性物品</li>
				</ul>
			</div>
		</div>

		<!-- 失物招领 -->
		<div id="seg-lost" class="mui-control-content">
			<div class="card">
				<ul class="mui-table-view" style="border:0;">
					<li class="mui-table-view-cell">
						黑色钱包一个
						<p class="sub">2023-05-02 · 101路</p>
					</li>
					<li class="mui-table-view-cell">
						蓝色雨伞一把
						<p class="sub">2023-05-02 · 56路</p>
					</li>
				</ul>
			</div>
		</div>
	</div>
	</div>

	<script src="../js/mui.min.js" type="text/javascript" charset="utf-8"></script>
	<script src="../libs/echarts-all.js" type="text/javascript" charset="utf-8"></script>
	<script src="../js/better.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		mui.init()

		document.getElementById('btn-back').addEventListener('tap', function() {
			if (window.plus) { plus.webview.currentWebview().close('slide-out-right') }
			else { window.history.back() }
		})
	</script>
</body>

</html>
