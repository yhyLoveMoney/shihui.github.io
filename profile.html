<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>我的</title>
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" type="text/css" href="../css/mui.min.css" />
	<link rel="stylesheet" type="text/css" href="../css/icons-extra.css" />
	<style>
		.card { background:#fff; border-radius:10px; box-shadow:0 1px 2px rgba(0,0,0,0.3); margin-bottom:10px; overflow:hidden; }
	</style>
</head>

<body>
	<header class="mui-bar mui-bar-nav">
		<h1 class="mui-title">我的</h1>
	</header>

	<div class="mui-content" style="background:#efeff4;">
	<div style="padding:10px;">
		<!-- 用户信息卡 -->
		<div class="card" style="padding:15px;">
			<div style="display:flex; align-items:center; gap:14px;">
				<span style="display:inline-flex; width:50px; height:50px; background:#007AFF; color:#fff; border-radius:50%; align-items:center; justify-content:center; font-size:20px; font-weight:600;">张</span>
				<div style="flex:1;">
					<p style="font-size:17px; font-weight:600;">张三</p>
					<p style="font-size:13px; color:#8f8f94; margin-top:4px;">138****6789</p>
				</div>
				<span class="mui-icon mui-icon-arrowright" style="color:#c8c7cc;"></span>
			</div>
		</div>

		<!-- 钱包统计 -->
		<div class="card" style="padding:14px;">
			<div style="display:flex; justify-content:space-around; text-align:center;">
				<div>
					<p style="color:#007AFF; font-size:17px; font-weight:bold;">¥56.50</p>
					<p style="color:#8f8f94; font-size:12px; margin-top:4px;">余额</p>
				</div>
				<div>
					<p style="color:#007AFF; font-size:17px; font-weight:bold;">3</p>
					<p style="color:#8f8f94; font-size:12px; margin-top:4px;">优惠券</p>
				</div>
				<div>
					<p style="color:#007AFF; font-size:17px; font-weight:bold;">860</p>
					<p style="color:#8f8f94; font-size:12px; margin-top:4px;">积分</p>
				</div>
			</div>
		</div>

		<!-- 菜单列表 -->
		<div class="card">
			<ul class="mui-table-view" style="border:0;">
				<li class="mui-table-view-cell">
					<a class="mui-navigate-right">
						<span class="mui-icon-extra mui-icon-extra-card" style="color:#007AFF; margin-right:12px;"></span>我的钱包
					</a>
				</li>
				<li class="mui-table-view-cell">
					<a class="mui-navigate-right">
						<span class="mui-icon mui-icon-list" style="color:#F0AD4E; margin-right:12px;"></span>我的订单
					</a>
				</li>
				<li class="mui-table-view-cell">
					<a class="mui-navigate-right">
						<span class="mui-icon mui-icon-star" style="color:#F0AD4E; margin-right:12px;"></span>我的收藏
					</a>
				</li>
				<li class="mui-table-view-cell">
					<a class="mui-navigate-right">
						<span class="mui-icon mui-icon-help" style="color:#4CD964; margin-right:12px;"></span>帮助中心
					</a>
				</li>
				<li class="mui-table-view-cell">
					<a class="mui-navigate-right">
						<span class="mui-icon mui-icon-gear" style="color:#929292; margin-right:12px;"></span>设置
					</a>
				</li>
			</ul>
		</div>
	</div>
	</div>

	<script src="../js/mui.min.js" type="text/javascript" charset="utf-8"></script>
	<script src="../libs/echarts-all.js" type="text/javascript" charset="utf-8"></script>
	<script src="../js/better.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		mui.init()
	</script>
</body>

</html>
