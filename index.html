<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实晖公司 - 专业、诚信、创新</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 顶部导航 */
        .nav {
            background: #2c3e50;
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav h1 {
            font-size: 24px;
        }

        .nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        /* 横幅 */
        .banner {
            height: 500px;
            background: linear-gradient(to right, #3498db, #2980b9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .banner h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .banner p {
            font-size: 20px;
            max-width: 800px;
            line-height: 1.6;
        }

        /* 公司介绍 */
        .about {
            padding: 80px 50px;
            text-align: center;
            background: #f8f9fa;
        }

        .about h3 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .about p {
            max-width: 900px;
            margin: 0 auto;
            font-size: 18px;
            line-height: 1.8;
            color: #555;
        }

        /* 底部 */
        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 30px;
        }
    </style>
</head>

<body>
    <!-- 导航 -->
    <div class="nav">
        <h1>实晖公司</h1>
        <ul>
            <li><a href="#">首页</a></li>
            <li><a href="#">关于我们</a></li>
            <li><a href="#">业务介绍</a></li>
            <li><a href="#">联系我们</a></li>
        </ul>
    </div>

    <!-- 横幅 -->
    <div class="banner">
        <h2>实晖公司 · 专业铸就品质</h2>
        <p>专注于企业服务、技术创新与行业解决方案，以诚信、专业、高效为理念，为客户创造长期价值。</p>
    </div>

    <!-- 公司介绍 -->
    <div class="about">
        <h3>关于实晖</h3>
        <p>
            实晖公司是一家致力于提供专业服务的企业，始终坚持以客户为中心，以品质为根本。
            我们拥有专业的团队、完善的服务体系与丰富的行业经验，为各类客户提供稳定、可靠、高效的解决方案。
            未来，实晖将持续创新、不断进步，与客户携手共赢，共创美好未来。
        </p>
    </div>

    <!-- 底部 -->
    <div class="footer">
        <p>实晖公司 © 版权所有</p>
    </div>
</body>
</html>
