<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>登录</title>
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" type="text/css" href="../css/mui.min.css" />
	<link rel="stylesheet" type="text/css" href="../css/icons-extra.css" />
</head>

<body>
	<header class="mui-bar mui-bar-nav">
		<h1 class="mui-title">登录</h1>
	</header>

	<div class="mui-content" style="background:#efeff4;">
		<div style="padding:40px 25px 25px;">
			<!-- Logo -->
			<div style="text-align:center; margin-bottom:24px;">
				<div style="display:inline-flex; width:64px; height:64px; background:#007AFF; border-radius:16px; align-items:center; justify-content:center;">
					<span class="mui-icon mui-icon-navigate" style="font-size:32px; color:#fff;"></span>
				</div>
			</div>

			<!-- 标题 -->
			<div style="text-align:center; margin-bottom:24px;">
				<p style="font-size:24px; font-weight:bold;">智慧公交</p>
				<p style="font-size:14px; color:#8f8f94; margin-top:6px;">智能出行，一码通行</p>
			</div>

			<!-- 手机号 -->
			<form class="mui-input-group" style="margin-bottom:12px;">
				<div class="mui-input-row">
					<label><span class="mui-icon mui-icon-phone" style="font-size:18px; color:#8f8f94;"></span></label>
					<input type="tel" placeholder="请输入手机号" id="phone" value="13600000000">
				</div>
			</form>

			<!-- 验证码 -->
			<div style="display:flex; gap:10px; margin-bottom:12px; align-items:stretch;">
				<form class="mui-input-group" style="flex:1; margin:0;">
					<div class="mui-input-row">
						<label><span class="mui-icon mui-icon-locked" style="font-size:18px; color:#8f8f94;"></span></label>
						<input type="text" placeholder="验证码" id="code" value="123456">
					</div>
				</form>
				<button type="button" class="mui-btn mui-btn-primary" id="btn-code" style="white-space:nowrap; font-size:12px;">获取验证码</button>
			</div>

			<!-- 登录按钮 -->
			<button type="button" class="mui-btn mui-btn-primary mui-btn-block" id="btn-login" style="margin-bottom:24px;">登录</button>

			<!-- 分割线 -->
			<div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
				<div style="flex:1; height:1px; background:#c8c7cc;"></div>
				<span style="font-size:12px; color:#8f8f94;">其他登录方式</span>
				<div style="flex:1; height:1px; background:#c8c7cc;"></div>
			</div>

			<!-- 微信登录 -->
			<button type="button" class="mui-btn mui-btn-block" style="background:#fff; border:1px solid #c8c7cc; margin-bottom:24px;">
				<span class="mui-icon mui-icon-weixin" style="color:#4CD964; margin-right:8px;"></span>微信登录
			</button>

			<!-- 协议 -->
			<p style="text-align:center; font-size:11px; color:#8f8f94;">登录即代表同意《用户协议》和《隐私政策》</p>
		</div>
	</div>

	<script src="../js/mui.min.js" type="text/javascript" charset="utf-8"></script>
	<script src="../libs/echarts-all.js" type="text/javascript" charset="utf-8"></script>
	<script src="../js/better.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		mui.init()

		document.getElementById('btn-code').addEventListener('tap', function() {
			mui.toast('验证码已发送')
		})

		document.getElementById('btn-login').addEventListener('tap', function() {
			mui.toast('登录成功')
			setTimeout(function() {
				goto('../index.html', '')
			}, 1500)
		})
	</script>
</body>

</html>
