<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>AI助手</title>
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" type="text/css" href="../css/mui.min.css" />
	<link rel="stylesheet" type="text/css" href="../css/icons-extra.css" />
	<style>
		#chat-area { position:absolute; top:44px; bottom:50px; left:0; right:0; overflow-y:auto; -webkit-overflow-scrolling:touch; background:#efeff4; padding:10px; }
		#input-bar { position:absolute; bottom:0; left:0; right:0; display:flex; gap:8px; padding:8px 10px; background:#fff; box-shadow:0 -1px 2px rgba(0,0,0,0.08); align-items:center; }
		#input-field { flex:1; height:34px; border-radius:6px; background:#efeff4; border:0; padding:0 10px; font-size:14px; outline:none; }
		#send-btn { width:34px; height:34px; border-radius:17px; background:#007AFF; border:0; flex-shrink:0; }
		.msg-row { display:flex; gap:8px; margin-bottom:12px; }
		.msg-row-user { justify-content:flex-end; }
		.av-ai { width:30px; height:30px; border-radius:50%; background:#007AFF; text-align:center; line-height:30px; flex-shrink:0; }
		.av-user { width:30px; height:30px; border-radius:50%; background:#007AFF; color:#fff; text-align:center; line-height:30px; font-size:13px; font-weight:600; flex-shrink:0; }
		.bub-ai { background:#fff; border-radius:10px; padding:10px; max-width:260px; box-shadow:0 1px 2px rgba(0,0,0,0.3); font-size:14px; color:#333; line-height:1.5; }
		.bub-user { background:#007AFF; color:#fff; border-radius:10px; padding:10px; max-width:210px; font-size:14px; line-height:1.5; }
		.ai-wrap { display:flex; flex-direction:column; gap:8px; max-width:270px; }
		.think-box { background:#fff; border:1px solid #c8c7cc; border-radius:10px; padding:10px; }
		.think-hd { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
		.think-step { display:flex; align-items:flex-start; gap:6px; margin-top:4px; }
		.think-dot { width:6px; height:6px; border-radius:3px; flex-shrink:0; margin-top:5px; }
		.func-card { border:1px solid #c8c7cc; border-radius:6px; padding:8px; margin-top:8px; }
		.func-card-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
	</style>
</head>

<body>
	<header class="mui-bar mui-bar-nav">
		<h1 class="mui-title">AI 助手</h1>
	</header>

	<div id="chat-area"></div>

	<div id="input-bar">
		<input type="text" id="input-field" placeholder="输入问题...">
		<button type="button" id="send-btn">
			<span class="mui-icon mui-icon-paperplane" style="color:#fff;font-size:16px;line-height:34px;"></span>
		</button>
	</div>

	<script src="../js/mui.min.js" type="text/javascript" charset="utf-8"></script>
	<script src="../libs/echarts-all.js" type="text/javascript" charset="utf-8"></script>
	<script src="../js/better.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		// NOTE: 本页面所有 innerHTML 均为硬编码静态内容，无用户输入拼接，无 XSS 风险
		mui.init()

		var chatArea = document.getElementById('chat-area')
		var inputField = document.getElementById('input-field')
		var sendBtn = document.getElementById('send-btn')
		var isProcessing = false
		var responseCount = 0

		function makeAvAI() {
			var d = document.createElement('div')
			d.className = 'av-ai'
			var s = document.createElement('span')
			s.className = 'mui-icon mui-icon-chatbubble'
			s.style.cssText = 'color:#fff;font-size:16px;'
			d.appendChild(s)
			return d
		}

		function makeAvUser() {
			var d = document.createElement('div')
			d.className = 'av-user'
			return d
		}

		// 页面加载：流式输出欢迎语
		addAIBubble('你好！我是智慧公交 AI 助手，可以帮你规划路线、查询实时公交。请问有什么可以帮你？', true)

		// 发送
		function handleSend() {
			if (isProcessing) return
			var text = inputField.value.trim()
			if (!text && responseCount === 0) text = '从人民广场到火车站怎么坐车最快？'
			if (!text) return
			inputField.value = ''
			isProcessing = true
			addUserBubble(text)
			responseCount++

			if (responseCount === 1) {
				setTimeout(startThinkingResponse, 500)
			} else {
				setTimeout(function() {
					addAIBubble('好的，我已为你设置到站提醒。101路预计3分钟后到达人民广场站，届时将通知你。', true, function() {
						isProcessing = false
					})
				}, 500)
			}
		}

		sendBtn.addEventListener('tap', handleSend)
		sendBtn.addEventListener('click', handleSend)
		inputField.addEventListener('keydown', function(e) {
			if (e.keyCode === 13) { e.preventDefault(); handleSend() }
		})

		// AI 气泡
		function addAIBubble(text, stream, cb) {
			var row = document.createElement('div')
			row.className = 'msg-row'
			row.appendChild(makeAvAI())
			var bub = document.createElement('div')
			bub.className = 'bub-ai'
			var span = document.createElement('span')
			bub.appendChild(span)
			row.appendChild(bub)
			chatArea.appendChild(row)
			if (stream) { streamText(span, text, 30, cb) } else { span.textContent = text; if (cb) cb() }
			bottom()
		}

		// 用户气泡
		function addUserBubble(text) {
			var row = document.createElement('div')
			row.className = 'msg-row msg-row-user'
			var bub = document.createElement('div')
			bub.className = 'bub-user'
			bub.textContent = text
			row.appendChild(bub)
			row.appendChild(makeAvUser())
			chatArea.appendChild(row)
			bottom()
		}

		// 思考链
		function startThinkingResponse() {
			var row = document.createElement('div')
			row.className = 'msg-row'
			row.appendChild(makeAvAI())
			var wrap = document.createElement('div')
			wrap.className = 'ai-wrap'
			row.appendChild(wrap)
			chatArea.appendChild(row)

			var tb = document.createElement('div')
			tb.className = 'think-box'
			wrap.appendChild(tb)

			// 思考头部
			var hd = document.createElement('div')
			hd.className = 'think-hd'
			var ico = document.createElement('span')
			ico.className = 'mui-icon mui-icon-info'
			ico.style.cssText = 'color:#8A6DE9;font-size:14px;'
			hd.appendChild(ico)
			var lbl = document.createElement('span')
			lbl.style.cssText = 'color:#8A6DE9;font-weight:600;font-size:12px;'
			lbl.textContent = '思考过程'
			hd.appendChild(lbl)
			var dur = document.createElement('span')
			dur.style.cssText = 'color:#8f8f94;font-size:11px;'
			dur.id = 'think-dur'
			hd.appendChild(dur)
			tb.appendChild(hd)
			bottom()

			var steps = [
				{ t: '解析用户意图：路线查询（人民广场→火车站）', d: '#007AFF', c: '#8f8f94' },
				{ t: '调用实时公交API，获取101路、56路运行状态', d: '#007AFF', c: '#8f8f94' },
				{ t: '计算最优路线：综合时间、换乘、步行距离', d: '#007AFF', c: '#8f8f94' },
				{ t: '生成2条推荐方案，附带实时到站预估', d: '#4CD964', c: '#4CD964' }
			]
			var t0 = Date.now(), si = 0
			var timer = setInterval(function() {
				var s = steps[si]
				var stepEl = document.createElement('div')
				stepEl.className = 'think-step'
				var dot = document.createElement('span')
				dot.className = 'think-dot'
				dot.style.background = s.d
				stepEl.appendChild(dot)
				var stxt = document.createElement('span')
				stxt.style.cssText = 'color:' + s.c + ';font-size:12px;line-height:1.4;'
				stxt.textContent = s.t
				stepEl.appendChild(stxt)
				tb.appendChild(stepEl)
				bottom()
				si++
				if (si >= steps.length) {
					clearInterval(timer)
					document.getElementById('think-dur').textContent = '用时 ' + ((Date.now() - t0) / 1000).toFixed(1) + 's'
					setTimeout(function() { showAnswer(wrap) }, 400)
				}
			}, 600)
		}

		// 回答 + 功能卡片
		function showAnswer(wrap) {
			var bub = document.createElement('div')
			bub.className = 'bub-ai'
			wrap.appendChild(bub)
			bottom()

			var txt = document.createElement('span')
			bub.appendChild(txt)

			streamText(txt, '为你找到以下路线方案：', 30, function() {
				// 卡片1：推荐
				bub.appendChild(makeRouteCard('推荐', '#007AFF', '约35分钟', '101路 → 步行200m → 地铁2号线', '换乘1次 · 步行450m · ¥3'))
				bottom()

				setTimeout(function() {
					// 卡片2：直达
					bub.appendChild(makeRouteCard('直达', '#4CD964', '约42分钟', '56路 直达', '无换乘 · 步行180m · ¥2'))

					var tip = document.createElement('p')
					tip.style.cssText = 'font-size:13px;color:#007AFF;margin:8px 0 0;'
					bub.appendChild(tip)
					bottom()

					inputField.placeholder = '继续对话...'
					isProcessing = false
				}, 400)
			})
		}

		// 构建路线功能卡片
		function makeRouteCard(tag, tagColor, time, desc, meta) {
			var card = document.createElement('div')
			card.className = 'func-card'

			var hd = document.createElement('div')
			hd.className = 'func-card-hd'
			var tagEl = document.createElement('span')
			tagEl.style.cssText = 'background:' + tagColor + ';color:#fff;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;'
			tagEl.textContent = tag
			hd.appendChild(tagEl)
			var timeEl = document.createElement('span')
			timeEl.style.cssText = 'font-size:13px;font-weight:bold;'
			timeEl.textContent = time
			hd.appendChild(timeEl)
			card.appendChild(hd)

			var descEl = document.createElement('p')
			descEl.style.cssText = 'font-size:12px;color:#333;margin:0;'
			descEl.textContent = desc
			card.appendChild(descEl)

			var metaEl = document.createElement('p')
			metaEl.style.cssText = 'font-size:11px;color:#8f8f94;margin:2px 0 0;'
			metaEl.textContent = meta
			card.appendChild(metaEl)

			// 功能卡片点击跳转
			card.addEventListener('tap', function() { goto('route_detail.html', '') })
			card.addEventListener('click', function() { goto('route_detail.html', '') })
			return card
		}

		// 流式输出
		function streamText(el, text, speed, cb) {
			var i = 0
			var t = setInterval(function() {
				el.textContent += text.charAt(i)
				bottom()
				i++
				if (i >= text.length) { clearInterval(t); if (cb) cb() }
			}, speed || 30)
		}

		function bottom() { chatArea.scrollTop = chatArea.scrollHeight }
	</script>
</body>

</html>
