<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>路线规划</title>
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" type="text/css" href="../css/mui.min.css" />
	<link rel="stylesheet" type="text/css" href="../css/icons-extra.css" />
	<style>
		.card { background:#fff; border-radius:10px; box-shadow:0 1px 2px rgba(0,0,0,0.3); margin-bottom:10px; overflow:hidden; }
	</style>
</head>

<body>
	<header class="mui-bar mui-bar-nav">
		<h1 class="mui-title">路线规划</h1>
	</header>

	<div class="mui-content" style="background:#efeff4;">
	<div style="padding:10px;">
		<!-- 起终点卡片 -->
		<div class="card">
			<div style="display:flex; align-items:center; gap:10px; padding:0 15px; height:44px;">
				<span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:#007AFF;"></span>
				<span style="font-size:16px;">人民广场站</span>
			</div>
			<div style="height:1px; background:#c8c7cc;"></div>
			<div style="display:flex; align-items:center; gap:10px; padding:0 15px; height:44px;">
				<span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:#DD524D;"></span>
				<span style="font-size:16px;">火车站</span>
			</div>
		</div>

		<!-- 搜索按钮 -->
		<button type="button" class="mui-btn mui-btn-primary mui-btn-block" style="border-radius:10px; margin-bottom:10px;">搜索路线</button>

		<!-- 推荐路线标题 -->
		<p style="font-size:15px; font-weight:bold; margin-bottom:10px;">推荐路线</p>

		<!-- 路线1：最快 -->
		<div class="card" id="route-1">
			<div style="display:flex; justify-content:space-between; align-items:center; padding:11px 15px;">
				<span style="background:#007AFF; color:#fff; padding:3px 8px; border-radius:3px; font-size:11px; font-weight:600;">最快</span>
				<span style="font-size:16px; font-weight:bold;">约 35 分钟</span>
			</div>
			<div style="height:1px; background:#c8c7cc;"></div>
			<div style="padding:11px 15px;">
				<p style="font-size:14px; color:#333;">101路 → 步行200m → 地铁2号线</p>
				<p style="font-size:12px; color:#8f8f94; margin-top:6px;">换乘1次 · 步行450m · 票价¥3</p>
			</div>
		</div>

		<!-- 路线2：少换乘 -->
		<div class="card" id="route-2">
			<div style="display:flex; justify-content:space-between; align-items:center; padding:11px 15px;">
				<span style="background:#4CD964; color:#fff; padding:3px 8px; border-radius:3px; font-size:11px; font-weight:600;">少换乘</span>
				<span style="font-size:16px; font-weight:bold;">约 42 分钟</span>
			</div>
			<div style="height:1px; background:#c8c7cc;"></div>
			<div style="padding:11px 15px;">
				<p style="font-size:14px; color:#333;">56路 直达</p>
				<p style="font-size:12px; color:#8f8f94; margin-top:6px;">无换乘 · 步行180m · 票价¥2</p>
			</div>
		</div>
	</div>
	</div>

	<script src="../js/mui.min.js" type="text/javascript" charset="utf-8"></script>
	<script src="../libs/echarts-all.js" type="text/javascript" charset="utf-8"></script>
	<script src="../js/better.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		mui.init()

		document.getElementById('route-1').addEventListener('tap', function() {
			goto('route_detail.html', '')
		})
		document.getElementById('route-2').addEventListener('tap', function() {
			goto('route_detail.html', '')
		})
	</script>
</body>

</html>
