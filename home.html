<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>首页</title>
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
	<link rel="stylesheet" type="text/css" href="../css/mui.min.css" />
	<link rel="stylesheet" type="text/css" href="../css/icons-extra.css" />
	<style>
		.card { background:#fff; border-radius:10px; box-shadow:0 1px 2px rgba(0,0,0,0.3); margin-bottom:10px; overflow:hidden; }
		.card-hd { display:flex; justify-content:space-between; align-items:center; padding:10px 15px; border-bottom:1px solid #c8c7cc; }
		.card-hd span { font-size:15px; font-weight:bold; }
		.card-hd a { font-size:13px; color:#007AFF; }
		.sub { font-size:12px; color:#8f8f94; margin-top:4px; }
		.grid-icon { display:inline-block; width:44px; height:44px; border-radius:50%; line-height:44px; text-align:center; color:#fff !important; font-size:22px !important; }
	</style>
</head>

<body>
	<header class="mui-bar mui-bar-nav">
		<h1 class="mui-title">智慧公交</h1>
	</header>

	<div id="refreshContainer" class="mui-content mui-scroll-wrapper" style="background:#efeff4;">
		<div class="mui-scroll">
			<div style="padding:10px;">
				<!-- 搜索栏 -->
				<div class="mui-input-row mui-search" style="margin:0 0 10px 0;">
					<input type="search" class="mui-input-clear" placeholder="搜索线路、站点或目的地">
				</div>

				<!-- 功能宫格 -->
				<div class="card">
					<ul class="mui-table-view mui-grid-view" style="border:0;">
						<li class="mui-table-view-cell mui-media mui-col-xs-3">
							<a id="grid-bus">
								<span class="mui-icon mui-icon-location grid-icon" style="background:#007AFF;"></span>
								<div class="mui-media-body">实时公交</div>
							</a>
						</li>
						<li class="mui-table-view-cell mui-media mui-col-xs-3">
							<a id="grid-route">
								<span class="mui-icon mui-icon-navigate grid-icon" style="background:#4CD964;"></span>
								<div class="mui-media-body">路线规划</div>
							</a>
						</li>
						<li class="mui-table-view-cell mui-media mui-col-xs-3">
							<a id="grid-qrcode">
								<span class="mui-icon mui-icon-paperplane grid-icon" style="background:#F0AD4E;"></span>
								<div class="mui-media-body">乘车码</div>
							</a>
						</li>
						<li class="mui-table-view-cell mui-media mui-col-xs-3">
							<a id="grid-more">
								<span class="mui-icon mui-icon-bars grid-icon" style="background:#8A6DE9;"></span>
								<div class="mui-media-body">更多服务</div>
							</a>
						</li>
					</ul>
				</div>

				<!-- 附近站点 -->
				<div class="card">
					<div class="card-hd"><span>附近站点</span><a>查看全部</a></div>
					<ul class="mui-table-view" style="border:0;">
						<li class="mui-table-view-cell mui-media" id="station-1">
							<a class="mui-navigate-right">
								<span class="mui-icon mui-icon-location mui-pull-left" style="color:#007AFF;"></span>
								<div class="mui-media-body">
									人民广场站
									<p class="mui-ellipsis sub">120m · 101路 202路 305路</p>
								</div>
							</a>
						</li>
						<li class="mui-table-view-cell mui-media" id="station-2">
							<a class="mui-navigate-right">
								<span class="mui-icon mui-icon-location mui-pull-left" style="color:#007AFF;"></span>
								<div class="mui-media-body">
									中山路站
									<p class="mui-ellipsis sub">350m · 18路 56路 109路</p>
								</div>
							</a>
						</li>
					</ul>
				</div>

				<!-- 新闻资讯 -->
				<div class="card">
					<div class="card-hd"><span>新闻资讯</span><a id="news-more">更多</a></div>
					<ul id="news-list" class="mui-table-view" style="border:0;">
						<li class="mui-table-view-cell">
							关于调整305路公交线路的通知
							<p class="sub">2023-05-02 · 市公交集团</p>
						</li>
						<li class="mui-table-view-cell">
							清明假期公交运营时间延长通知
							<p class="sub">2023-05-02 · 市公交集团</p>
						</li>
					</ul>
				</div>
			</div>
		</div>
	</div>

	<script src="../js/mui.min.js" type="text/javascript" charset="utf-8"></script>
	<script src="../libs/echarts-all.js" type="text/javascript" charset="utf-8"></script>
	<script src="../js/better.js" type="text/javascript" charset="utf-8"></script>
	<script type="text/javascript">
		mui.init({
			pullRefresh: {
				container: '#refreshContainer',
				up: {
					contentrefresh: '正在加载...',
					contentnomore: '没有更多数据了',
					callback: pullupRefresh
				}
			}
		})

		var loadIdx = 0
		var moreNews = [
			{ title: '新增夜间班车N1路开通运营', date: '2023-05-02 · 市公交集团' },
			{ title: '五一假期公交专线开放预约', date: '2023-05-02 · 市公交集团' },
			{ title: '智慧公交APP全新升级通知', date: '2023-05-02 · 市公交集团' },
			{ title: '公交IC卡全面支持NFC充值', date: '2023-05-02 · 市公交集团' },
			{ title: '12路公交线路优化调整公告', date: '2023-05-02 · 市公交集团' }
		]

		function pullupRefresh() {
			setTimeout(function() {
				var list = document.getElementById('news-list')
				var noMore = true
				for (var j = 0; j < 2 && loadIdx < moreNews.length; j++, loadIdx++) {
					var n = moreNews[loadIdx]
					var li = document.createElement('li')
					li.className = 'mui-table-view-cell'
					li.textContent = n.title
					var p = document.createElement('p')
					p.className = 'sub'
					p.textContent = n.date
					li.appendChild(p)
					list.appendChild(li)
					noMore = false
				}
				mui('#refreshContainer').pullRefresh().endPullupToRefresh(loadIdx >= moreNews.length)
			}, 1000)
		}

		// 切换父页面Tab
		function switchTab(index) {
			if (window.plus) {
				mui.fire(plus.webview.currentWebview().parent(), 'switchTab', { index: index })
			}
		}

		document.getElementById('grid-bus').addEventListener('tap', function() {
			goto('route_detail.html', '')
		})
		// document.getElementById('grid-route').addEventListener('tap', function() {
		// 	goto('', '')
		// })
		// document.getElementById('grid-qrcode').addEventListener('tap', function() {
		// 	goto('', '')
		// })
		document.getElementById('grid-more').addEventListener('tap', function() {
			goto('info.html', '')
		})
		document.getElementById('station-1').addEventListener('tap', function() {
			goto('route_detail.html', '')
		})
		document.getElementById('station-2').addEventListener('tap', function() {
			goto('route_detail.html', '')
		})
		document.getElementById('news-more').addEventListener('tap', function() {
			goto('info.html', '')
		})
	</script>
</body>

</html>
